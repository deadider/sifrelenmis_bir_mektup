<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">

        /* 🎨 RENK, TASARIM VE BOYUT AYARLARI */
        :root {
            --arka-plan-gradient-1: rgba(0, 0, 0, 0.4); /* Fotoğrafın üstündeki karartma katmanı */
            --arka-plan-gradient-2: rgba(0, 0, 0, 0.4); 
            --kart-arka-plani: rgba(255, 255, 255, 0.92); /* Kutuyu hafif şeffaf yaptım, arkadaki görsel tatlı görünür */
            --ana-yazi-rengi: #4a4a4a;       
            --vurgu-rengi: #ff477e;          
            --sayac-rengi: #ff7096;          
            --mektup-arka-plani: #fff0f3;    
            --mektup-sol-cizgi: #ff477e;     
            --mektup-yazi-rengi: #5c5c5c;    

            /* 📐 1. DIŞ KUTU BOYUTLARI (Mektup ve Sayacın İçinde Durduğu Beyaz Kart) */
            --kart-maksimum-genislik: 380px; /* Kartın telefondaki genişliği */
            --kart-ic-bosluk: 30px;          /* Kutunun içindeki öğelerin kenarlara olan uzaklığı */
            --kart-yuvarlaklik: 20px;        /* Dış kutunun köşelerinin ovalliği */

            /* ✉️ 2. MEKTUP YAZI ALANI BOYUTLARI (Sadece Mektup Kağıdının Boyutları) */
            --mektup-yukseklik: 250px;       /* Mektup alanının dikine uzunluğu. Yazın uzunsa bunu arttırabilirsin */
            --mektup-ic-bosluk: 20px;        /* Yazının mektup kağıdının kenarlarına olan uzaklığı */
            --mektup-yazi-boyutu: 1rem;      /* Yazıların büyüklüğü */
            --mektup-satir-araligi: 1.6;     /* Satırların birbirine olan mesafesi */
            --mektup-yuvarlaklik: 12px;      /* Mektup kağıdının köşelerinin ovalliği */
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* 📸 YÜKLEDİĞİN DIKEY GÖRSEL ENTEGRE EDİLDİ */
            background: linear-gradient(var(--arka-plan-gradient-1), var(--arka-plan-gradient-2)), 
                        url('efe_piraye_arka_plan.png') no-repeat center center fixed;
            background-size: cover; 
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            overflow: hidden;
            color: var(--ana-yazi-rengi);
        }

        /* 📱 DIŞ KUTU */
        .container {
            text-align: center;
            background: var(--kart-arka-plani);
            padding: var(--kart-ic-bosluk); 
            border-radius: var(--kart-yuvarlaklik); 
            box-shadow: 0 15px 35px rgba(0,0,0,0.15); 
            max-width: var(--kart-maksimum-genislik); 
            width: 85%; 
            backdrop-filter: blur(5px); 
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-sizing: border-box;
        }

        h1 {
            color: var(--vurgu-rengi);
            margin-bottom: 8px;
            font-size: 1.5rem; 
            font-weight: 700;
        }

        p {
            font-size: 0.95rem;
            line-height: 1.4;
        }

        #sayac {
            font-size: 2.2rem; 
            font-weight: bold;
            color: var(--sayac-rengi);
            margin: 20px 0;
            letter-spacing: 2px;
        }

        .kilit-ikonu {
            font-size: 3.5rem;
            margin-bottom: 10px;
            display: inline-block;
            animation: hafifSalla 2s infinite ease-in-out; 
        }

        #mektup-alani {
            display: none;
            animation: yukariDogruAcil 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* ✉️ İÇ MEKTUP ALANI */

            background: var(--mektup-arka-plani);

            padding: var(--mektup-ic-bosluk);
            border-radius: var(--mektup-yuvarlaklik);
            text-align: left;
            line-height: var(--mektup-satir-araligi);
